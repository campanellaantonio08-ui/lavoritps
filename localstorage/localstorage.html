<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Anagrafica</h1>

<h2>Dati personali</h2>
Nome:<br>
<input type="text" id="nome"><br>

Cognome:<br>
<input type="text" id="cognome"><br>

Anno di nascita:<br>
<input type="number" id="nascita"><br>

<h2>Luogo di residenza</h2>
Regione:<br>
<select id="regione" onchange="caricaProvince()">
    <option value="">Seleziona regione</option>
    <option value="Abruzzo">Abruzzo</option>
    <option value="Basilicata">Basilicata</option>
    <option value="Calabria">Calabria</option>
    <option value="Campania">Campania</option>
    <option value="Emilia-Romagna">Emilia-Romagna</option>
    <option value="Friuli-Venezia Giulia">Friuli-Venezia Giulia</option>
    <option value="Lazio">Lazio</option>
    <option value="Liguria">Liguria</option>
    <option value="Lombardia">Lombardia</option>
    <option value="Marche">Marche</option>
    <option value="Molise">Molise</option>
    <option value="Piemonte">Piemonte</option>
    <option value="Puglia">Puglia</option>
    <option value="Sardegna">Sardegna</option>
    <option value="Sicilia">Sicilia</option>
    <option value="Toscana">Toscana</option>
    <option value="Trentino-Alto Adige">Trentino-Alto Adige</option>
    <option value="Umbria">Umbria</option>
    <option value="Valle d'Aosta">Valle d'Aosta</option>
    <option value="Veneto">Veneto</option>
</select><br>


Indirizzo:<br>
<input type="text" id="indirizzo"><br>

<h2>sesso</h2>
<input type="radio" name="sesso" value="Femmina"> Femmina<br>
<input type="radio" name="sesso" value="Maschio"> Maschio<br>
<input type="radio" name="sesso" value="Altro"> Altro<br>

<h2>veicoli</h2>
<input type="checkbox" class="veicoli" value="Bicicletta"> Bicicletta<br>
<input type="checkbox" class="veicoli" value="Automobile"> Automobile<br>
<input type="checkbox" class="veicoli" value="Moto"> Moto<br>
<input type="checkbox" class="veicoli" value="Barca"> Barca<br>
<input type="checkbox" class="veicoli" value="Monopattino"> Monopattino<br>
<input type="checkbox" class="veicoli" value="Camper"> Camper<br>
<input type="checkbox" class="veicoli" value="Scooter"> Scooter<br>

<h2>Sport</h2>
<select id="sport" multiple>
    <option>Atletica</option>
    <option>Pallavolo</option>
    <option>Nuoto</option>
    <option>Calcio</option>
    <option>Tennis</option>
    <option>Basket</option>
    <option>Rugby</option>
    <option>Hockey</option>
    <option>Pallanuoto</option>
    <option>Ciclismo</option>
    <option>Equitazione</option>
    <option>Arti marziali</option>
    <option>Boxe</option>
    <option>Danza</option>
    <option>Golf</option>
    <option>Sci</option>
    <option>Snowboard</option>
</select>

<br><br>
<input type="button" value="Inserisci" onclick="salva()">
<input type="button" value="Svuota elenco" onclick="svuota()">
<br><br>

<a href="stampa.html">Stampa</a>

<script>
let elenco = [];

function salva() {
    let dati = localStorage.getItem("elenco");
    if (dati != null) elenco = JSON.parse(dati);

    let persona = {};
    persona.nome = document.getElementById("nome").value;
    persona.cognome = document.getElementById("cognome").value;
    persona.nascita = document.getElementById("nascita").value;
    persona.regione = document.getElementById("regione").value;
    persona.indirizzo = document.getElementById("indirizzo").value;


    let sesso = document.getElementsByName("sesso");
    persona.sesso = "";
    for (let i = 0; i < sesso.length; i++) {
        if (sesso[i].checked) {
            persona.sesso = sesso[i].value;
            break;
        }
    }


    persona.veicoli = [];
    let veicoli = document.getElementsByClassName("veicoli");
    for (let i = 0; i < veicoli.length; i++) {
        if (veicoli[i].checked) persona.veicoli.push(veicoli[i].value);
    }

 
    persona.sport = [];
    let sportOpt = document.getElementById("sport").options;
    for (let i = 0; i < sportOpt.length; i++) {
        if (sportOpt[i].selected) persona.sport.push(sportOpt[i].value);
    }

    elenco.push(persona);
    localStorage.setItem("elenco", JSON.stringify(elenco));
}

function svuota() {
    localStorage.removeItem("elenco");
}
</script>

</body>
</html>
